<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Galeria de Fotos | Mestre de RPG</title>
    <link rel="stylesheet" href="css/estilo.css">
    <style>
        .galeria {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }
        .foto-card {
            background: #311b92;
            padding: 10px;
            border-radius: 10px;
            border: 2px solid #9370db;
            text-align: center;
            width: 250px;
        }
        .foto-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 5px;
            border: 1px solid #4b0082;
        }
        .foto-card p {
            margin-top: 10px;
            font-size: 0.9em;
            color: #d1c4e9;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <img src="imagens/logoUniube.png" width="120" alt="Logo Uniube">
        <h1>Mestre dos Mundos: RPG</h1>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
    
            </ul>
        </nav>
    </header>

    <main>
        <h2>Galeria de Personagens e Artes</h2>
        <div class="galeria">

            <div class="foto-card">
                <img src="imagens/rpg/rpg7.jpg" alt="Personagem RPG">
                <p>Exploradora de Relíquias</p>
            </div>

            <div class="foto-card">
                <img src="imagens/rpg/rpg8.jpg" alt="Personagem RPG">
                <p>Guerreiro Veterano</p>
            </div>

            <div class="foto-card">
                <img src="imagens/rpg/rpg9.jpg" alt="Personagem RPG">
                <p>Mestre das Sombras</p>
            </div>

            <div class="foto-card">
                <img src="imagens/rpg/rpg10.jpg" alt="Personagem RPG">
                <p>Arqueira Élfica</p>
            </div>

            <div class="foto-card">
                <img src="imagens/rpg/rpg3.jpeg" alt="Personagem RPG">
                <p>Cavaleiro da Ordem</p>
            </div>

            <div class="foto-card">
                <img src="imagens/rpg/rpg6.png" alt="Personagem RPG">
                <p>Feiticeira Arcana</p>
            </div>

        </div>
    </main>

    <footer>
        <hr>
        <p>Desenvolvido por:Samantha Aparecida RA:1200661</p>
    </footer>
</body>
</html>
