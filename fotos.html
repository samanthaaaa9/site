<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Galeria de Fotos | Mestre de RPG</title>
    <link rel="stylesheet" href="css/estilo.css">
    <style>
        .galeria { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .foto-card { background: #311b92; padding: 10px; border-radius: 10px; border: 2px solid #9370db; text-align: center; width: 250px; }
        .foto-card img { width: 100%; height: 250px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="fotos.html">Galeria</a></li>
            </ul>
        </nav>
        <h1>Galeria de Personagens</h1>
    </header>

    <main>
        <div class="galeria">
            <div class="foto-card">
                <img src="imagens/rpg7.jpg" alt="RPG">
                <p>Guerreira de Elite</p>
            </div>
            <div class="foto-card">
                <img src="imagens/rpg8.jpg" alt="RPG">
                <p>Mestre de Armas</p>
            </div>
            <div class="foto-card">
                <img src="imagens/rpg3.jpeg" alt="RPG">
                <p>Paladino</p>
            </div>
            <div class="foto-card">
                <img src="imagens/rpg6.png" alt="RPG">
                <p>Feiticeira</p>
            </div>
        </div>
    </main>
</body>
</html>
